<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>GeoSpatialNusantaraEkstern</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh;width:100%}
    
.leaflet-popup-content table {
    font-size:12px;
}
.leaflet-popup-content td {
    word-break: break-word;
}
/* ================= SIDEBAR ================= */
#sidebar{
position:fixed;
top:0;
right:0;
width:370px;
height:100%;
background:#f4f4f4;
box-shadow:-3px 0 10px rgba(0,0,0,.2);
transform:translateX(100%);
transition:.3s;
z-index:1000;
overflow:hidden;
}
#sidebar.active{transform:translateX(0)}

#toggleBtn{
position:fixed;
top:15px;
right:15px;
z-index:2000;
padding:8px 12px;
border:none;
border-radius:6px;
background:white;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,.2);
transition:right .3s ease;
}

/* ================= TABS ================= */
.tabs{display:flex;background:#e0e0e0}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:bold}
.tab.active{background:white;border-bottom:3px solid #2c7be5}
.tab-content{display:none;padding:15px;height:calc(100% - 45px);overflow:auto}
.tab-content.active{display:block}

/* ================= ROW ================= */
.row{display:flex;align-items:center;margin-top:8px}
.arrow{margin-right:6px;cursor:pointer;transition:.3s}
.arrow.rotate{transform:rotate(90deg)}

.toggle{
width:16px;height:16px;border-radius:50%;
background:#bbb;margin-right:8px;cursor:pointer;
transition:.2s;
}
.toggle.active{background:#2c7be5}

.year-container{display:none;margin-left:20px}

input{
width:100%;padding:8px;margin-bottom:10px;
border-radius:6px;border:1px solid #ccc;
}

.leaflet-control-layers label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}

.leaflet-control-layers input {
    margin: 0;
}

#searchResult div{
padding:6px;
background:white;
margin-bottom:4px;
border-radius:6px;
cursor:pointer;
border:1px solid #ddd;
}

#searchResult div:hover{
background:#2c7be5;
color:white;
}
    
</style>
</head>

<body>

<div id="map"></div>
<button id="toggleBtn">☰</button>

<div id="sidebar">

<div class="tabs">
<div class="tab active" data-tab="layerTab">Layer</div>
<div class="tab" data-tab="uploadTab">Upload</div>
</div>

<div id="layerTab" class="tab-content active">

<input type="text" id="searchInput" placeholder="Cari file... (contoh: 2023, jalan, sulawesi)">
<div id="searchResult" style="margin-bottom:15px;"></div>

<div id="layerList"></div>

</div>

<div id="uploadTab" class="tab-content">
<input type="file" id="uploadInput" multiple accept=".zip,.kml,.kmz">
<hr>
<div id="uploadList"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>
<script src="https://unpkg.com/leaflet-omnivore@latest/leaflet-omnivore.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const OWNER="GeoSpatialNusantara";
const REPO="WebGis";
const BRANCH="main";
const ROOT="file";
const markerImage=`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/img/point-of-interest.png`;
const customIcon = L.icon({
    iconUrl: `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/img/marker.png`,
    iconSize: [32, 32],
    iconAnchor: [16, 32]
});

const map = L.map('map', {
    minZoom: 5,     // tidak bisa zoom out lebih jauh dari Indonesia
    maxZoom: 18     // tetap bisa zoom in detail
}).setView([-2.5,118],5);
    
// Basemap OSM (default)
const osm = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap' }
);

// Basemap Satellite Hybrid (Satelit + Label)
const satellite = L.layerGroup([
    L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        { attribution: 'Tiles © Esri' }
    ),
    L.tileLayer(
        'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
        { attribution: 'Labels © Esri' }
    )
]);

// tampilkan default
satellite.addTo(map);

// kontrol layer (pojok kiri atas)
L.control.layers(
    {
        "One Street Map": osm,
        "Satellite": satellite
    },
    null,
    { position: 'topleft' }
).addTo(map);

toggleBtn.onclick=()=>{
sidebar.classList.toggle("active");
if(sidebar.classList.contains("active")){
toggleBtn.style.right="385px";
}else{
toggleBtn.style.right="15px";
}
};

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=function(){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
tab.classList.add("active");
document.getElementById(tab.dataset.tab).classList.add("active");
};
});

let layerStore={};

const searchInput = document.getElementById("searchInput");
const searchResult = document.getElementById("searchResult");

searchInput.addEventListener("input", function(){

    const keyword = this.value.toLowerCase();
    searchResult.innerHTML="";

    if(keyword.length < 2){
        searchResult.innerHTML="";
        return;
    }

    for(let key in layerStore){

        const fileName = key.split("/").pop().toLowerCase();

        if(fileName.includes(keyword)){

            const item = document.createElement("div");
            item.innerText = key.split("/").pop();

            item.onclick = async function(){

                await loadLayer(key);

                const layer = layerStore[key].layer;

if(layer){
    const bounds = layer.getBounds();
    if(bounds && bounds.isValid()){
        map.fitBounds(bounds, {
            padding:[50,50],
            maxZoom:16
        });
    }
}
                searchResult.innerHTML="";
                searchInput.value="";
            };

            searchResult.appendChild(item);
        }
    }
});
    
async function fetchGitHub(path){
const url=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`;
const res=await fetch(url);
return await res.json();
}
    
async function fetchTXT(key){
    const txtPath = key.replace(/\.(zip|kml|kmz)$/i,".txt");
    const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${txtPath}`;

    try{
        const res = await fetch(url + "?t=" + Date.now()); // ⬅️ anti cache
        if(!res.ok){
            console.warn("TXT tidak ditemukan:", url);
            return null;
        }

        const text = await res.text();
        return text.trim(); // ⬅️ penting
    }catch(e){
        console.error("Fetch TXT error:", e);
        return null;
    }
}
    
async function loadStructure(){
const container=document.getElementById("layerList");
const cats=await fetchGitHub(ROOT);

for(const cat of cats){
if(cat.type!=="dir") continue;

const row=document.createElement("div");
row.className="row";

const arrow=document.createElement("span");
arrow.className="arrow";
arrow.innerHTML="▶";

const catToggle=document.createElement("div");
catToggle.className="toggle";

const label=document.createElement("span");
label.innerText=cat.name;

row.append(arrow,catToggle,label);
container.appendChild(row);

const yearContainer=document.createElement("div");
yearContainer.className="year-container";
container.appendChild(yearContainer);

arrow.onclick=()=>{
yearContainer.style.display=
yearContainer.style.display==="block"?"none":"block";
arrow.classList.toggle("rotate");
};

let yearToggles=[];

catToggle.onclick=async(e)=>{
e.stopPropagation();
catToggle.classList.toggle("active");
const active=catToggle.classList.contains("active");

for(const y of yearToggles){
if(active && !y.classList.contains("active")) await y.click();
if(!active && y.classList.contains("active")) await y.click();
}
};

const years=await fetchGitHub(cat.path);

for(const year of years){
if(year.type!=="dir") continue;

const yRow=document.createElement("div");
yRow.className="row";

const yToggle=document.createElement("div");
yToggle.className="toggle";

const yLabel=document.createElement("span");
yLabel.innerText=year.name;

yRow.append(yToggle,yLabel);
yearContainer.appendChild(yRow);

yearToggles.push(yToggle);

const files=await fetchGitHub(year.path);
for(const file of files){
if(!file.name.match(/\.(zip|kml|kmz)$/i)) continue;
layerStore[file.path]={url:file.download_url,layer:null,marker:null};
}

yToggle.onclick=()=>toggleYear(year.path,yToggle);
}
}
}

async function toggleYear(path,toggle){
toggle.classList.toggle("active");
const active=toggle.classList.contains("active");

for(let key in layerStore){
if(key.startsWith(path)){
if(active) await loadLayer(key);
else{
if(layerStore[key].layer) map.removeLayer(layerStore[key].layer);

}
}
}
}

function addCenterMarker(layer,key){

    const bounds = layer.getBounds();
    if(!bounds || !bounds.isValid()) return;

    const center = bounds.getCenter();

    const icon = L.icon({
        iconUrl: markerImage,
        iconSize: [30,30],
        iconAnchor: [15,30]
    });

    if(layerStore[key].marker){
        map.removeLayer(layerStore[key].marker);
    }

    const fileName = key.split("/").pop();
    const fileUrl = layerStore[key].url;

    const marker = L.marker(center,{icon}).addTo(map);

    // isi popup dengan nama + link download
    const popupContent = `
        <div style="text-align:center;">
            <b>${fileName}</b><br>
            <a href="${fileUrl}" download style="color:#2c7be5;text-decoration:none;font-weight:bold;">
                Download
            </a>
        </div>
    `;

    marker.bindPopup(popupContent,{
    closeButton: false,
    autoClose: false,
    closeOnClick: false,
    offset:[0,-25]
});
let popupHovered = false;
let markerHovered = false;

marker.on("mouseover", function () {
    markerHovered = true;
    this.openPopup();
});

marker.on("mouseout", function () {
    markerHovered = false;
    setTimeout(() => {
        if (!popupHovered && !markerHovered) {
            marker.closePopup();
        }
    }, 200);
});

marker.on("click", function(){
    const bounds = layer.getBounds();
    if(bounds && bounds.isValid()){
        map.fitBounds(bounds, {
            padding:[50,50],
            maxZoom: 16
        });
    }
});

marker.on("popupopen", function () {
    const popupEl = marker.getPopup().getElement();

    if (!popupEl._hoverBound) {

        popupEl.addEventListener("mouseenter", function () {
            popupHovered = true;
        });

        popupEl.addEventListener("mouseleave", function () {
            popupHovered = false;
            setTimeout(() => {
                if (!popupHovered && !markerHovered) {
                    marker.closePopup();
                }
            }, 200);
        });

        popupEl._hoverBound = true;
    }
});

    layerStore[key].marker = marker;

}

async function loadLayer(key){
    console.log("LOAD:", key, layerStore[key].url);
    if(layerStore[key].layer){
        map.addLayer(layerStore[key].layer);
        return;
    }

    let layer;

    const txtData = await fetchTXT(key);

    // ================= ZIP (SHP) =================
    if(layerStore[key].url.toLowerCase().endsWith(".zip")){

    const buffer = await (await fetch(layerStore[key].url)).arrayBuffer();
    const geo = await shp(buffer);

    if(!geo || !geo.features || geo.features.length === 0){
        console.error("GeoJSON kosong:", key);
        return;
    }

    layer = L.geoJSON(geo,{
    onEachFeature:(f,l)=>{

        if(l.getBounds){ // polygon
            const center = l.getBounds().getCenter();

            // geser 2 km
            const angle = Math.random() * 360;
const shifted = offsetLatLng(center, 2, angle);

            const marker = L.marker(shifted, {icon: customIcon}).addTo(map);

            attachInteraction(marker, key, txtData || null, layer);
        }
    }
});
}

    // ================= KMZ =================
    else if(layerStore[key].url.toLowerCase().endsWith(".kmz")){

        const buffer = await (await fetch(layerStore[key].url)).arrayBuffer();
        const zip = await JSZip.loadAsync(buffer);

        let kmlFile=null;
        zip.forEach((p,z)=>{
            if(p.toLowerCase().endsWith(".kml")) kmlFile=z;
        });

        if(!kmlFile){
            console.error("KML tidak ditemukan:", key);
            return;
        }

        const text = await kmlFile.async("text");

        const blob = new Blob([text],{type:"text/xml"});
        const url = URL.createObjectURL(blob);

        layer = omnivore.kml(url);

        layer.on("ready",()=>{
            layer.eachLayer(l=>{

    if(l instanceof L.Marker) return;

    if(l.getBounds){
        const center = l.getBounds().getCenter();

        const angle = Math.random() * 360;
const shifted = offsetLatLng(center, 2, angle);

        const marker = L.marker(shifted, {icon: customIcon}).addTo(map);

        attachInteraction(marker, key, txtData || null, layer);
    }

});

            layer.addTo(map);
        });
    }

    // ================= KML =================
    else{

        layer = omnivore.kml(layerStore[key].url);

        layer.on("ready",()=>{
            layer.eachLayer(l=>{

    if(l instanceof L.Marker) return;

    if(l.getBounds){
        const center = l.getBounds().getCenter();

        const angle = Math.random() * 360;
const shifted = offsetLatLng(center, 2, angle);

        const marker = L.marker(shifted, {icon: customIcon}).addTo(map);

        attachInteraction(marker, key, txtData || null, layer);
    }

});

            layer.addTo(map);
        });
    }

    layerStore[key].layer = layer;
}
/* ================= UPLOAD ================= */
uploadInput.addEventListener("change",async e=>{
for(const file of e.target.files){

let layer;
if(file.name.endsWith(".zip")){
const buffer=await file.arrayBuffer();
const geo=await shp(buffer);
layer=L.geoJSON(geo);
}else if(file.name.endsWith(".kmz")){
const buffer=await file.arrayBuffer();
const zip=await JSZip.loadAsync(buffer);

let kmlFile;
zip.forEach((relativePath, zipEntry)=>{
if(relativePath.endsWith(".kml")){
kmlFile=zipEntry;
}
});

if(kmlFile){
const kmlText=await kmlFile.async("text");
layer=omnivore.kml.parse(kmlText);
}

}else{
layer=omnivore.kml.parse(await file.text());
}

const key="upload_"+Date.now()+file.name;
layerStore[key]={layer:layer,marker:null};

const row=document.createElement("div");
row.className="row";

const toggle=document.createElement("div");
toggle.className="toggle active";

const label=document.createElement("span");
label.innerText=file.name;

row.append(toggle,label);
uploadList.appendChild(row);

toggle.onclick=()=>{
toggle.classList.toggle("active");
if(toggle.classList.contains("active")){
layer.addTo(map);
map.fitBounds(layer.getBounds());
}else{
map.removeLayer(layer);
}
};

toggle.click();
}
});

function formatLabel(text){
    return text.replace(/_/g," ");
}

function offsetLatLng(latlng, distanceKm = 2, bearingDeg = 45){
    const R = 6371; // radius bumi (km)

    const d = distanceKm / R;
    const bearing = bearingDeg * Math.PI / 180;

    const lat1 = latlng.lat * Math.PI / 180;
    const lng1 = latlng.lng * Math.PI / 180;

    const lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(d) +
        Math.cos(lat1) * Math.sin(d) * Math.cos(bearing)
    );

    const lng2 = lng1 + Math.atan2(
        Math.sin(bearing) * Math.sin(d) * Math.cos(lat1),
        Math.cos(d) - Math.sin(lat1) * Math.sin(lat2)
    );

    return L.latLng(lat2 * 180 / Math.PI, lng2 * 180 / Math.PI);
}
    
function attachInteraction(layerItem, key, txtData, layer){

let data = null;

if(txtData){
    try{
        // coba parse JSON dulu
        data = JSON.parse(txtData);
    }catch(e){

        // fallback: parsing manual format TXT bebas
        data = {};
        const lines = txtData.split("\n");

        lines.forEach(line => {
            line = line.trim();

            if(line.includes(":")){
                const parts = line.split(":");

                const key = parts[0]
                    .replace(/["{}]/g,"")
                    .trim();

                const value = parts.slice(1).join(":")
                    .replace(/["{}]/g,"")
                    .trim();

                if(key) data[key] = value;
            }
        });

        console.log("TXT parsed manual:", data);
    }
}

const fileName = key.split("/").pop();

let html = `
<div style="
    font-family:Arial;
    width:260px;
">

    <!-- HEADER -->
    <div style="
        font-weight:bold;
        font-size:14px;
        margin-bottom:8px;
        color:#2c7be5;
    ">
        ${fileName}
    </div>

    <!-- CONTENT -->
    <div style="
        max-height:180px;
        overflow:auto;
        border:1px solid #eee;
        border-radius:6px;
    ">

    <table style="
        width:100%;
        border-collapse:collapse;
        font-size:12px;
    ">
`;

    let i = 0;

if(data){
    for(let k in data){

        const bg = i % 2 === 0 ? "#ffffff" : "#f9f9f9";

        html += `
        <tr style="background:${bg}">
            <td style="
                padding:6px;
                font-weight:600;
                white-space:nowrap;
                width:45%;
                color:#444;
                border-bottom:1px solid #eee;
            ">
                ${formatLabel(k)}
            </td>

            <td style="
                padding:6px;
                color:#222;
                border-bottom:1px solid #eee;
            ">
                ${data[k]}
            </td>
        </tr>
        `;
        i++;
    }
}else{
    html += `
    <tr>
        <td style="padding:6px;color:#999">
            Data tidak tersedia
        </td>
    </tr>`;
}

    html += "</table>";
    html += `
    </table>
    </div>

    <!-- BUTTON -->
    <div style="margin-top:10px;text-align:center;">
        <button onclick="downloadAll('${key}')"
        style="
            background:#2c7be5;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
            width:100%;
            font-weight:bold;
        ">
            ⬇ Download Data
        </button>
    </div>

</div>
`;

    layerItem.bindPopup(html,{
        closeButton:false,
        autoClose:false,
        closeOnClick:false
    });

    // ===== HOVER =====
    let isHover = false;
    let popupHover = false;

    layerItem.on("mouseover", function(e){
        isHover = true;
        this.openPopup(e.latlng);
    });

    layerItem.on("mouseout", function(){
        isHover = false;
        setTimeout(()=>{
            if(!isHover && !popupHover){
                layerItem.closePopup();
            }
        },200);
    });

    layerItem.on("popupopen", function(){
        const el = layerItem.getPopup().getElement();

        if(!el._binded){
            el.addEventListener("mouseenter", ()=> popupHover = true);
            el.addEventListener("mouseleave", ()=>{
                popupHover = false;
                setTimeout(()=>{
                    if(!isHover && !popupHover){
                        layerItem.closePopup();
                    }
                },200);
            });
            el._binded = true;
        }
    });

    // ===== CLICK ZOOM =====
    layerItem.on("click", function(){
        const bounds = layerItem.getBounds ? layerItem.getBounds() : null;

        if(bounds && bounds.isValid()){
            map.flyToBounds(bounds,{
                padding:[50,50],
                maxZoom:16,
                duration:1.2
            });
        }
    });
}
    
async function downloadAll(key){

    const fileUrl = layerStore[key].url;
    const txtPath = key.replace(/\.(zip|kml|kmz)$/i,".txt");
    const txtUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${txtPath}`;

    // ===== DOWNLOAD FILE UTAMA =====
    try{
        const res1 = await fetch(fileUrl);
        const blob1 = await res1.blob();

        const a1 = document.createElement("a");
        a1.href = URL.createObjectURL(blob1);
        a1.download = fileUrl.split("/").pop();
        document.body.appendChild(a1);
        a1.click();
        a1.remove();

    }catch(e){
        console.error("Download file utama gagal:", e);
    }

    // ===== DOWNLOAD TXT =====
    try{
        const res2 = await fetch(txtUrl);

        if(res2.ok){
            const blob2 = await res2.blob();

            const a2 = document.createElement("a");
            a2.href = URL.createObjectURL(blob2);
            a2.download = txtPath.split("/").pop();
            document.body.appendChild(a2);
            a2.click();
            a2.remove();
        }else{
            console.warn("TXT tidak ditemukan:", txtUrl);
        }

    }catch(e){
        console.error("Download TXT gagal:", e);
    }
}
loadStructure();
</script>

</body>
</html>
